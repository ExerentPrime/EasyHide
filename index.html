<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ0UI - Script Generator</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/avatars/217698445186695170/fb81d2ae7710794c2bd52afdabfa5017.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap">
</head>
<body class="min-h-screen">

    <div class="bokeh-bg">
        <div class="blob purple"></div>
        <div class="blob blue"></div>
        <div class="blob purple"></div>
        <div class="blob blue"></div>
        <div class="blob cyan"></div>
    </div>

    <nav class="topnav">
        <div class="nav-brand">
            <img src="EZ0UI.svg" alt="EZ0UI" class="h-8 w-auto logo-glow">
            <span class="version-badge">V2.7</span>
        </div>
        <div id="selectionStatus" class="hidden selection-pill">
            <i data-lucide="check-square" class="w-3.5 h-3.5"></i>
            <span id="selectionCount">0</span>
            <span class="sel-pill-label">selected</span>
        </div>
    </nav>

    <main class="main-wrap">

        <!-- PICKER -->
        <div id="pickerArea" class="picker-zone">
            <div class="picker-inner">
                <div class="picker-icon-wrap">
                    <i id="pickerIcon" data-lucide="folder-search" class="w-9 h-9 text-purple-400"></i>
                </div>
                <p id="pickerText" class="picker-label">Open FrameAnalysis Folder</p>
                <!-- <p class="picker-sub">Select the folder generated by XXMI Launcher</p> -->
            </div>
            <input type="file" id="fileInput" webkitdirectory directory multiple class="hidden">
        </div>

        <!-- VIEWER -->
        <div id="viewer" class="hidden viewer-layout">

            <div class="gallery-container" id="galleryBox">
                <button class="nav-btn btn-prev" onclick="changeImage(-1)">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i>
                </button>
                <img id="prevImg" class="pixel-layer">
                <img id="currentImg" class="pixel-layer">
                <button class="nav-btn btn-next" onclick="changeImage(1)">
                    <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Controls Row: 5 cards -->
            <div class="controls-row">

                <!-- Counter -->
                <div class="ctrl-card counter-card">
                    <div class="card-collapsed">
                        <i data-lucide="image" class="card-icon" aria-hidden="true"></i>
                        <span class="card-value mono" id="counterDisplay">1 / 1</span>
                    </div>
                </div>

                <!-- Blend Mode -->
                <div class="ctrl-card expandable" id="blendCard">
                    <div class="card-collapsed">
                        <i data-lucide="blend" class="card-icon"></i>
                        <span class="card-value" id="blendLabel">Normal</span>
                    </div>
                    <div class="card-expanded">
                        <p class="exp-title">Blend Mode</p>
                        <div class="blend-toggle-row">
                            <button class="blend-toggle-btn active" id="btnNormal" onclick="setBlend('normal')">Normal</button>
                            <button class="blend-toggle-btn" id="btnDiff" onclick="setBlend('diff')">Diff</button>
                        </div>
                    </div>
                </div>

                <!-- Brightness -->
                <div class="ctrl-card expandable" id="brCard">
                    <div class="card-collapsed">
                        <i data-lucide="sun" class="card-icon"></i>
                        <span class="card-value mono" id="brVal">100%</span>
                    </div>
                    <div class="card-expanded">
                        <div class="exp-header-row">
                            <p class="exp-title">Brightness</p>
                            <button onclick="resetBr()" class="mini-reset">Reset</button>
                        </div>
                        <input type="range" id="brSlider" min="0.5" max="2" step="0.1" value="1" oninput="applyFilters()" class="ctrl-slider">
                    </div>
                </div>

                <!-- Contrast -->
                <div class="ctrl-card expandable" id="ctCard">
                    <div class="card-collapsed">
                        <i data-lucide="contrast" class="card-icon"></i>
                        <span class="card-value mono" id="ctVal">100%</span>
                    </div>
                    <div class="card-expanded">
                        <div class="exp-header-row">
                            <p class="exp-title">Contrast</p>
                            <button onclick="resetCt()" class="mini-reset">Reset</button>
                        </div>
                        <input type="range" id="ctSlider" min="1" max="2" step="0.5" value="1" oninput="applyFilters()" class="ctrl-slider">
                    </div>
                </div>

                <!-- Eye / Selection -->
                <div class="ctrl-card expandable eye-card" id="eyeCard">
                    <div class="card-collapsed" id="eyeCollapsed" onclick="toggleEye()">
                        <div class="eye-icon-wrap" id="eyeIconWrap">
                            <i data-lucide="eye" class="card-icon" id="eyeMainIcon"></i>
                        </div>
                        <span class="card-value eye-status" id="eyeStatus">Visible</span>
                    </div>
                    <div class="card-expanded eye-expanded">
                        <p class="exp-title">Selection</p>
                        <input type="checkbox" id="currentCheckbox" class="hidden">
                        <div class="eye-toggle-row">
                            <button class="eye-toggle-btn" id="eyeToggleBtn" onclick="toggleEye()">
                                <i data-lucide="eye-off" class="w-4 h-4" id="eyeExpandedIcon"></i>
                                <span id="eyeToggleLabel">Mark Hidden</span>
                            </button>
                        </div>
                        <div class="eye-actions">
                            <button onclick="invertSelection()" class="eye-action-btn">
                                <i data-lucide="flip-horizontal-2" class="w-3 h-3"></i>
                                Invert
                            </button>
                            <button onclick="resetAll()" class="eye-action-btn danger-btn">
                                <i data-lucide="trash-2" class="w-3 h-3"></i>
                                Reset
                            </button>
                        </div>
                    </div>
                </div>

            </div>

            <button id="generateBtn" class="generate-btn" disabled>
                <i data-lucide="zap" class="w-4 h-4"></i>
                <span>Generate EZ0UI.ini</span>
            </button>
        </div>
    </main>

    <!-- Result Modal -->
    <div id="modalOverlay">
        <div class="result-modal">
            <div class="modal-header">
                <div class="modal-title">
                    <i data-lucide="file-code" class="w-4 h-4 text-purple-400"></i>
                    <span>EZ0UI.ini</span>
                </div>
                <div class="modal-actions">
                    <button id="copyBtn" class="modal-btn">
                        <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                        <span>Copy</span>
                    </button>
                    <button id="headerToggleBtn" class="modal-btn success-btn">
                        HEADER: <span id="headerStatusText">ON</span>
                    </button>
                    <button onclick="closeModal()" class="modal-btn danger-modal-btn">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </div>
            <textarea id="resultArea" readonly></textarea>
        </div>
    </div>

    <!-- Alert Modal -->
    <div id="alertModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="alert-box transform transition-all scale-95 opacity-0" id="modalBox">
            <i data-lucide="alert-circle" class="w-12 h-12 text-red-400 mx-auto mb-4"></i>
            <h3 class="alert-title">Invalid Folder</h3>
            <p class="alert-body">No valid FrameAnalysis files were detected. Please check your files and try again.</p>
            <button onclick="closeAlert()" class="alert-btn">Understood</button>
        </div>
    </div>

    <script src="script.js"></script>

    <!-- Music Pill -->
    <div class="fixed bottom-7 left-7 z-[150]">
        <div class="icon-pill" id="musicPill">
            <button id="musicToggle" class="pill-icon-btn" aria-label="Toggle music">
                <i id="musicIcon" data-lucide="music" class="w-4 h-4"></i>
            </button>
            <span id="musicTooltip" class="pill-label">Click to play</span>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="鼠辈舞台.mp3" type="audio/mpeg">
    </audio>

    <!-- Helper Agent -->
    <div class="helper-container">
        <div id="helperTooltip" class="helper-tooltip">Need help?</div>
        <div class="helper-avatar" onclick="cycleHelperText()"></div>
    </div>

</body>
</html>
